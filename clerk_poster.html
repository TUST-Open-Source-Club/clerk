<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Clerk - 终端办公 AI Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      width: 1000px;
      height: 1400px;
      overflow: hidden;
      position: relative;
    }
    .bg-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle at 20% 50%, rgba(74, 144, 226, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(80, 200, 120, 0.08) 0%, transparent 50%);
    }
    .container {
      position: relative;
      z-index: 1;
      padding: 80px 90px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .header {
      text-align: center;
      margin-bottom: 60px;
    }
    .logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #4a90e2, #50c878);
      border-radius: 30px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      font-weight: 900;
      box-shadow: 0 20px 60px rgba(74, 144, 226, 0.3);
    }
    .name {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #4a90e2, #50c878);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
    }
    .tagline {
      font-size: 32px;
      color: #a0b4d0;
      font-weight: 300;
      letter-spacing: 8px;
    }
    .divider {
      width: 120px;
      height: 4px;
      background: linear-gradient(90deg, #4a90e2, #50c878);
      margin: 0 auto 50px;
      border-radius: 2px;
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 35px;
      margin-bottom: 50px;
    }
    .feature-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 35px;
      backdrop-filter: blur(10px);
    }
    .feature-icon {
      font-size: 36px;
      margin-bottom: 15px;
    }
    .feature-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }
    .feature-desc {
      font-size: 18px;
      color: #8fa3bf;
      line-height: 1.6;
    }
    .abilities {
      background: rgba(74, 144, 226, 0.08);
      border: 1px solid rgba(74, 144, 226, 0.15);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 50px;
    }
    .abilities-title {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
      color: #4a90e2;
    }
    .ability-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }
    .ability-tag {
      background: rgba(74, 144, 226, 0.15);
      border: 1px solid rgba(74, 144, 226, 0.25);
      color: #7eb8f7;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 400;
    }
    .footer {
      margin-top: auto;
      text-align: center;
      padding-top: 40px;
    }
    .footer-text {
      font-size: 22px;
      color: #5a7399;
      letter-spacing: 2px;
    }
    .highlight {
      color: #50c878;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="container">
    <div class="header">
      <div class="logo">C</div>
      <div class="name">Clerk</div>
      <div class="tagline">终端办公 AI Agent</div>
    </div>
    
    <div class="divider"></div>
    
    <div class="features">
      <div class="feature-card">
        <div class="feature-icon">&#128193;</div>
        <div class="feature-title">文件与文档处理</div>
        <div class="feature-desc">支持 Word、Excel、PDF 等格式的读写与转换，轻松应对各类办公文档需求。</div>
      </div>
      <div class="feature-card">
        <div class="feature-icon">&#127760;</div>
        <div class="feature-title">网页浏览与采集</div>
        <div class="feature-desc">内置无头浏览器，可访问网页、截图、生成 PDF，还能抓取网络数据。</div>
      </div>
      <div class="feature-card">
        <div class="feature-icon">&#9889;</div>
        <div class="feature-title">代码执行与终端</div>
        <div class="feature-desc">支持 Shell 命令执行，能够运行脚本、操作文件系统、自动化处理任务。</div>
      </div>
      <div class="feature-card">
        <div class="feature-icon">&#129309;</div>
        <div class="feature-title">多 Agent 协作</div>
        <div class="feature-desc">可创建多个子 Agent 并行或顺序协作，复杂任务分工处理，效率倍增。</div>
      </div>
    </div>
    
    <div class="abilities">
      <div class="abilities-title">核心能力一览</div>
      <div class="ability-list">
        <span class="ability-tag">文档渲染</span>
        <span class="ability-tag">PDF 合并/拆分</span>
        <span class="ability-tag">HTML 转海报</span>
        <span class="ability-tag">图片/视频读取</span>
        <span class="ability-tag">数据表格处理</span>
        <span class="ability-tag">技能存储复用</span>
      </div>
    </div>
    
    <div class="footer">
      <div class="footer-text">
        高效 · 专业 · 可靠 · <span class="highlight">你的智能办公助手</span>
      </div>
    </div>
  </div>
</body>
</html>
