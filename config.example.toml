# Clerk 配置文件示例
# 复制到 ~/.config/clerk/config.toml 并按需修改

[llm]
model = "gpt-4o-mini"
base_url = "https://api.openai.com/v1"
api_key = "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
timeout_seconds = 600
temperature = 0.7

# 某些模型（如 Moonshot kimi-k2.6）只支持 temperature = 1，可在此处覆盖。

[tui]
theme = "default"
show_sidebar = true

[storage]
# db_path = "/path/to/clerk.db"

[multimodal]
# supports_images = true
# supports_video = true

# 工具审批：配置后，除 auto_approve 外的工具执行前需要用户确认；
# 不配置本节则保持旧行为（所有工具直接执行）。
# [permissions]
# yolo = false
# auto_approve = ["fs_read", "fs_list", "web_fetch"]

# working_dir = "/path/to/workspace"
